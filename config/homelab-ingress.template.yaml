apiVersion: v1
kind: Service
metadata:
  name: homelab-service
  namespace: default
spec:
  ports:
    - { name: sonarr, port: 8989, targetPort: 8989 }
    - { name: radarr, port: 7878, targetPort: 7878 }
    - { name: overseerr, port: 5055, targetPort: 5055 }
    - { name: plex, port: 32400, targetPort: 32400 }
    - { name: immich, port: 2283, targetPort: 2283 }
    - { name: sabnzbd, port: 8080, targetPort: 8080 }
---
apiVersion: v1
kind: Endpoints
metadata:
  name: homelab-service
  namespace: default
subsets:
  - addresses:
      - ip: __HOST_IP__
    ports:
      - { name: sonarr, port: 8989 }
      - { name: radarr, port: 7878 }
      - { name: overseerr, port: 5055 }
      - { name: plex, port: 32400 }
      - { name: immich, port: 2283 }
      - { name: sabnzbd, port: 8080 }
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homelab-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
spec:
  ingressClassName: nginx
  rules:
    - host: sonarr.samurai.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: homelab-service, port: { number: 8989 } } }
    - host: radarr.samurai.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: homelab-service, port: { number: 7878 } } }
    - host: overseerr.samurai.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: homelab-service, port: { number: 5055 } } }
    - host: plex.samurai.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: homelab-service, port: { number: 32400 } } }
    - host: immich.samurai.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: homelab-service, port: { number: 2283 } } }
    - host: sabnzbd.samurai.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: homelab-service, port: { number: 8080 } } }
